<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeePride - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!--Parte esquerda do site -->

    <main class="login-container">
        <section class="brand-side">
            <div class="logo-wrapper">
                <img src="Imagens/abelha.png" alt="BeePride_logo" class="bee-icon">
                <h1>BeePride</h1>
            </div>
        </section>

    <!--Área de login -->
        <section class="form-side">
            <div class="form-wrapper">
                <h2>Faça seu login</h2>
                
                <form>
                    <input type="email" placeholder="Endereço de e-mail" class="input-field">
                    <div class="password-container">
                        <input type="password" placeholder="Senha" class="input-field">
                        <a href="#" class="forgot-password">Esqueceu-se da senha?</a>
                    </div>
                    
                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>

                <div class="divider">
                    <span>ou</span>
                </div>

                <div class="social-login">
                    <button class="btn-social">
                        <img src="Imagens/Google_logo.png" alt="Google">
                        Continuar com o Google
                    </button>

                    <!-- TROCAR PARA CONECTAR COM IOS ID-->
                    <button class="btn-social">
                        <img src="Imagens/IOS_logo.png" alt="APPLE ID">
                        Continuar com o Apple ID
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
